<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marc'sNet</title>

<style>
body { 
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0a3d62, #38ada9);
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    overflow: hidden;
    position: relative;
}
.glow {
    position: absolute;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(46, 204, 113, 0.35), transparent 70%);
    animation: pulse 6s infinite alternate;
    z-index: 0;
}
@keyframes pulse {
    from { transform: scale(1); opacity: 0.6; }
    to { transform: scale(1.3); opacity: 0.3; }
}
h1, p, .tabs, .search-box, .buttons, .recent, footer, .results {
    z-index: 1;
}
h1 { font-size: 3em; margin-bottom: 5px; color:#2ecc71; text-shadow:0 0 15px #27ae60; }
p { margin-bottom: 20px; opacity: 0.9; }
.tabs { margin-bottom: 15px; }
.tabs button {
    background: transparent;
    border: none;
    color: white;
    margin: 0 10px;
    font-size: 0.9em;
    cursor: pointer;
    opacity: 0.7;
    padding: 5px 10px;
    border-radius: 15px;
    transition: 0.3s;
}
.tabs button.active { background: rgba(255,255,255,0.2); opacity: 1; }
.tabs button:hover { opacity: 1; }
.search-box {
    display: flex;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.15);
    border-radius: 50px;
    overflow: hidden;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}
.search-box input {
    flex: 1;
    padding: 15px 20px;
    border: none;
    outline: none;
    font-size: 1em;
    background: transparent;
    color: white;
}
.search-box button {
    background: #2ecc71;
    border: none;
    padding: 0 30px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}
.search-box button:hover { background: #27ae60; }
.buttons { margin-top: 15px; }
.buttons button {
    background: rgba(255,255,255,0.2);
    border: none;
    padding: 8px 15px;
    margin: 5px;
    border-radius: 20px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}
.buttons button:hover { background: rgba(255,255,255,0.35); }
.recent {
    margin-top: 20px;
    font-size: 0.85em;
    opacity: 0.85;
}
.recent span {
    display: inline-block;
    margin: 5px;
    cursor: pointer;
    text-decoration: underline;
}
.results {
    margin-top: 20px;
    width: 90%;
    max-width: 600px;
    text-align: left;
}
.result-item {
    background: rgba(46, 204, 113,0.15);
    padding: 10px 12px;
    margin-bottom: 8px;
    border-radius: 12px;
}
.result-item a {
    color: #2ecc71;
    text-decoration: none;
}
.result-item a:hover { text-decoration: underline; }
.loading { text-align: center; margin-top: 10px; }
footer { position: absolute; bottom: 20px; font-size: 0.9em; opacity: 0.8; }
</style>
</head>

<body>
<div class="glow"></div>

<h1>Marc'sNet</h1>
<p>Search the web simply.</p>

<div class="tabs">
    <button class="active" onclick="setSearch('web', this)">Web</button>
    <button onclick="setSearch('images', this)">Images</button>
    <button onclick="setSearch('news', this)">News</button>
</div>

<form class="search-box" id="searchForm" onsubmit="handleSearch(event)">
    <input type="text" id="searchInput" placeholder="Search the web..." required>
    <button type="submit">Search</button>
</form>

<div class="buttons">
    <button onclick="luckySearch()">I'm Feeling Lucky</button>
</div>

<div class="recent" id="recentSearches"></div>
<div class="loading" id="loading"></div>
<div class="results" id="results"></div>

<footer>© 2026 Marc'sNet</footer>

<script>
let currentType = "web";

function setSearch(type, el){
    currentType = type;
    document.querySelectorAll(".tabs button").forEach(btn=>btn.classList.remove("active"));
    el.classList.add("active");
    if(document.getElementById("searchInput").value.trim()!=="") handleSearch(new Event('submit'));
}

function handleResults(data){
    const resultsDiv=document.getElementById("results");
    const loading=document.getElementById("loading");
    resultsDiv.innerHTML="";
    loading.innerText="";

    let results=[];
    if(data.RelatedTopics){
        data.RelatedTopics.forEach(item=>{
            if(item.Text && item.FirstURL) results.push({text:item.Text,url:item.FirstURL});
            if(item.Topics) item.Topics.forEach(sub=>{
                if(sub.Text && sub.FirstURL) results.push({text:sub.Text,url:sub.FirstURL});
            });
        });
    }

    if(currentType==='images') results=results.filter(r=>/.(jpg|png|gif|jpeg)$/i.test(r.url));
    if(currentType==='news') results=results.filter(r=>/news/i.test(r.text));

    if(results.length===0){
        const query=document.getElementById("searchInput").value.trim();
        results.push({text:`Search "${query}" on DuckDuckGo`, url:"https://duckduckgo.com/?q="+encodeURIComponent(query)});
    }

    results.slice(0,8).forEach(r=>{
        const div=document.createElement("div");
        div.className="result-item";
        div.innerHTML=`<a href="${r.url}" target="_blank" rel="noopener noreferrer">${r.text}</a>`;
        resultsDiv.appendChild(div);
    });
}

function handleSearch(e){
    e.preventDefault();
    const query=document.getElementById("searchInput").value.trim();
    if(!query) return;
    saveRecent(query);

    const loading=document.getElementById("loading");
    const resultsDiv=document.getElementById("results");
    resultsDiv.innerHTML="";
    loading.innerText="Searching the ocean depths...";

    const oldScript=document.getElementById("jsonpScript");
    if(oldScript) oldScript.remove();

    const script=document.createElement("script");
    script.id="jsonpScript";
    script.src=`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1&callback=handleResults`;
    document.body.appendChild(script);
}

function luckySearch(){
    const query=document.getElementById("searchInput").value.trim();
    if(!query) return;
    window.location.href="https://duckduckgo.com/?q="+encodeURIComponent(query);
}

function saveRecent(query){
    let searches=JSON.parse(localStorage.getItem("marcsnet_recent"))||[];
    if(!searches.includes(query)){
        searches.unshift(query);
        searches=searches.slice(0,5);
        localStorage.setItem("marcsnet_recent", JSON.stringify(searches));
    }
    loadRecent();
}

function loadRecent(){
    let searches=JSON.parse(localStorage.getItem("marcsnet_recent"))||[];
    const container=document.getElementById("recentSearches");
    container.innerHTML=searches.length?"Recent: ":"";
    searches.forEach(q=>{
        const span=document.createElement("span");
        span.textContent=q;
        span.onclick=()=>{document.getElementById("searchInput").value=q; handleSearch(new Event('submit'));};
        container.appendChild(span);
    });
}

loadRecent();
document.getElementById("searchInput").addEventListener("keypress",e=>{if(e.key==='Enter') handleSearch(e);});
</script>
</body>
</html>
