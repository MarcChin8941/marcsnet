<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Marc'sNet</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #001f3f 0%, #000 80%);
    color: white;
    overflow-x: hidden;
}

.explosion {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 400px;
    height: 400px;
    margin-left: -200px;
    margin-top: -200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,255,255,0.8) 0%, rgba(0,0,128,0.1) 70%);
    animation: pulse 3s infinite;
    z-index: -1;
}

@keyframes pulse {
    0% { transform: scale(0.8); opacity: 0.6; }
    50% { transform: scale(1.3); opacity: 1; }
    100% { transform: scale(0.8); opacity: 0.6; }
}

.container {
    text-align: center;
    padding-top: 15vh;
}

h1 {
    font-size: 3em;
    color: #00ffff;
    text-shadow: 0 0 15px #00ffff;
}

input[type="text"] {
    width: 60%;
    padding: 12px;
    font-size: 1.2em;
    border-radius: 25px;
    border: none;
    outline: none;
}

button {
    padding: 12px 20px;
    font-size: 1.1em;
    border-radius: 25px;
    border: none;
    background-color: #00ffff;
    color: #001f3f;
    cursor: pointer;
    margin-left: 10px;
}

button:hover {
    background-color: #00bbbb;
}

.results {
    margin: 40px auto;
    max-width: 800px;
    text-align: left;
}

.result-item {
    background: rgba(0,255,255,0.1);
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 15px;
    transition: 0.3s;
}

.result-item:hover {
    background: rgba(0,255,255,0.25);
}

.result-item a {
    color: #00ffff;
    font-size: 1.1em;
    text-decoration: none;
}

.result-item a:hover {
    text-decoration: underline;
}

.loading {
    text-align: center;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="explosion"></div>

<div class="container">
    <h1>Marc'sNet</h1>
    <input type="text" id="searchBox" placeholder="Search the deep web..." />
    <button onclick="doSearch()">Search</button>

    <div class="loading" id="loading"></div>
    <div class="results" id="results"></div>
</div>

<script>
async function doSearch() {
    const query = document.getElementById("searchBox").value.trim();
    const resultsDiv = document.getElementById("results");
    const loading = document.getElementById("loading");

    if (!query) return;

    resultsDiv.innerHTML = "";
    loading.innerText = "Searching the ocean depths...";

    try {
        const corsProxy = "https://api.allorigins.win/raw?url=";
        const apiUrl = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;

        const response = await fetch(corsProxy + encodeURIComponent(apiUrl));
        const data = await response.json();

        loading.innerText = "";

        let results = [];

        if (data.RelatedTopics) {
            data.RelatedTopics.forEach(item => {
                if (item.Text && item.FirstURL) {
                    results.push({
                        text: item.Text,
                        url: item.FirstURL
                    });
                }
                if (item.Topics) {
                    item.Topics.forEach(sub => {
                        if (sub.Text && sub.FirstURL) {
                            results.push({
                                text: sub.Text,
                                url: sub.FirstURL
                            });
                        }
                    });
                }
            });
        }

        if (results.length === 0) {
            results.push({
                text: `Search "${query}" on DuckDuckGo`,
                url: "https://duckduckgo.com/?q=" + encodeURIComponent(query)
            });
        }

        results.slice(0, 8).forEach(result => {
            const div = document.createElement("div");
            div.className = "result-item";
            div.innerHTML = `
                <a href="${result.url}" target="_blank" rel="noopener noreferrer">
                    ${result.text}
                </a>
            `;
            resultsDiv.appendChild(div);
        });

    } catch (error) {
        loading.innerText = "API error. Please try again.";
        console.error(error);
    }
}

document.getElementById("searchBox").addEventListener("keypress", function(e) {
    if (e.key === "Enter") doSearch();
});
</script>

</body>
</html>
